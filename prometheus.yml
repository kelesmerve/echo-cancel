global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']

  - job_name: 'user-profile-service'
    static_configs:
      - targets: ['user-profile-service:3001']

  - job_name: 'interaction-ingestion'
    static_configs:
      - targets: ['interaction-ingestion:3002']

  - job_name: 'feed-recommendation-service'
    static_configs:
      - targets: ['feed-recommendation-service:3003']

  - job_name: 'graph-updater-service'
    static_configs:
      - targets: ['graph-updater-service:3004']
