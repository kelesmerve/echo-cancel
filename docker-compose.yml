version: '3.8'

services:
  # --- 1. VERİTABANLARI VE BROKER ---
  postgres:
    image: postgres:15-alpine
    container_name: echo-cancel-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: userprofile_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d userprofile_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: echo-cancel-neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: echo-cancel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: echo-cancel-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- 2. MİKROSERVİSLER ---
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - user-profile-service
      - interaction-ingestion
      - feed-recommendation-service

  user-profile-service:
    build: ./user-profile-service
    container_name: user-profile-service
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  interaction-ingestion:
    build: ./interaction-ingestion
    container_name: interaction-ingestion
    ports:
      - "3002:3002"
    environment:
      - PG_URL=postgres://admin:password123@postgres:5432/ingestion_db?sslmode=disable
      - REDIS_ADDR=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  feed-recommendation-service:
    build: ./feed-recommendation # Klasör adı görselindekiyle tam eşleşecek şekilde düzeltildi!
    container_name: feed-recommendation-service
    ports:
      - "3003:3003"
    environment:
      - REDIS_URL=redis://redis:6379/2
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  graph-updater-service:
    build: ./graph-updater-service
    container_name: graph-updater-service
    ports:
      - "3004:3004"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379/1
      - FEED_CACHE_REDIS_URL=redis://redis:6379/2
    depends_on:
      rabbitmq:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- 3. GÖZLEMLEME (OBSERVABILITY) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3005:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data: