version: '3.8'

services:
  # Kullanıcı profilleri için ilişkisel veritabanı
  postgres:
    image: postgres:15-alpine
    container_name: echo-cancel-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-userprofile_db}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # İkinci DB'yi oluşturacak script
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d userprofile_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Idempotency anahtarları için bellek içi önbellek
  redis:
    image: redis:7-alpine
    container_name: echo-cancel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Asenkron olay iletimi için mesaj aracısı (Yönetim arayüzü dahil)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: echo-cancel-rabbitmq
    ports:
      - "5672:5672"   # Servislerin bağlanacağı port
      - "15672:15672" # Tarayıcıdan erişilebilen yönetim arayüzü portu
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Dinamik ilgi ağırlıklandırma grafı için veritabanı
  neo4j:
    image: neo4j:5
    container_name: echo-cancel-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
    ports:
      - "7474:7474"   # Tarayıcıdan erişilebilen HTTP arayüzü
      - "7687:7687"   # Servislerin bağlanacağı Bolt protokolü portu
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: